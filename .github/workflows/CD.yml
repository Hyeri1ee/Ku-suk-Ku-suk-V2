name: CD

on:
  push:
    branches:
      - dev

env:
  S3_BUCKET_NAME: kusuk
  PROJECT_NAME: KU-suk-Ku-suk

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Get latest zip file from S3
        id: get_latest_zip
        run: |
          latest_zip=$(aws s3 ls s3://$S3_BUCKET_NAME/$PROJECT_NAME/ --recursive --region ap-northeast-2 | \
          grep '\.zip$' | \
          sort -k1,1r -k2,2r | head -n 1 | awk '{print $4}')
          echo "latest_zip=$latest_zip" >> $GITHUB_OUTPUT

      - name: Deploy via AWS CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name KU-suk-Ku-suk-App \
            --deployment-config-name CodeDeployDefault.OneAtATime \
            --deployment-group-name KU-suk-Ku-suk \
            --s3-location bucket=$S3_BUCKET_NAME,bundleType=zip,key=${{ steps.get_latest_zip.outputs.latest_zip }} \
            --region ap-northeast-2

