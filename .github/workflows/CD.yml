name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  S3_BUCKET_NAME: kusuk
  PROJECT_NAME: KU-suk-Ku-suk

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{secrets.AWS_REGIOIN}}

      - name: Deploy via AWS CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name KU-suk-Ku-suk-App \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --deployment-group-name KU-suk-Ku-suk-Group \
            --s3-location bucket=$S3_BUCKET_NAME,bundleType=zip,key=$PROJECT_NAME/${{ github.event.workflow_run.head_sha }}.zip \
            --region ap-northeast-2

