# workflow의 이름
name: CI

# 해당 workflow가 언제 실행될 것인지에 대한 트리거를 지정
on:
  push:
    branches:
      - dev
      - 'devops/*' #테스트를 위해 잠시 추가

jobs:
  build:
    name: CI
    runs-on: ubuntu-latest

    steps:
      #workflow 실행전 checkout
      - uses: actions/checkout@v3
        with:
          fetch-depth: '0' #모든 커밋과 브랜치를 가져옴

      # jdk 21버전 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      #github secrets yml 환경변수 주입.
      - name: Set Yaml
        uses: microsoft/variable-substitution@v1
        with:
          files: ./src/main/resources/application.yml
        env:
          spring.datasource.url: ${{ secrets.DB_URL }}
          spring.datasource.username: ${{ secrets.DB_USERNAME }}
          spring.datasource.password: ${{ secrets.DB_PASSWORD }}
          spring.datasource.driver-class-name: ${{ secrets.DB_DRIVER }}
          spring.jwt.secret: ${{ secrets.JWT_SECRET }}
          spring.data.redis.host: ${{secrets.REDIS_HOST}}
          spring.data.redis.port: ${{secrets.REDIS_PORT}}
          spring.data.redis.password: ${{secrets.REDIS_PASSWORD}}
          spring.mail.username: ${{secrets.MAIL_USERNAME}}
          spring.mail.password: ${{secrets.MAIL_PASSWORD}}
          cloud.aws.credentials.accessKey: ${{secrets.S3_ACCESSKEY}}
          cloud.aws.credentials.secretKey: ${{secrets.S3_SECRETKEY}}
          cloud.aws.s3.bucketName: ${{secrets.S3_BUCKETNAME}}
          #cloud.aws.cloudfront.domainName: ${{secrets.CLOUDFRONT_NAME}}

      #gradlew 실행을 위한 권한 추가
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        shell: bash

      # build
      - name: Build with Gradle
        run: ./gradlew build -x test
        shell: bash

      # git 사용자 정보 설정
      - name: set git user identity
        run: |
          git config user.name ${{secrets.USERNAME}}
          git config user.email ${{secrets.USEREMAIL}}

      # origin dev로 머지
      - name: merge to dev branch
        if: ${{ success() }}
        #build 성공시 아래 실행
        run: |
          git checkout dev
          git merge "${GITHUB_REF#refs/heads/}" --no-ff
          git push origin dev

      # upstream dev로 pull request 생성
      - name: Create Pull Request to dev
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: dev # 머지 대상 (ex: dev 브랜치로 PR 생성)
          branch: ${{ github.ref_name }} # 현재 브랜치에서
          title: '[chore]: 자동 PR ${{ github.ref_name }} → dev'
          body: |
            이 PR은 CI 워크플로우에 의해 자동 생성되었습니다.
            ✅모든 CI step들을 완료하여 자동으로 upstream dev에 머지되었음을 증명합니다.
            
            From 브랜치: `${{ github.ref_name }}`
