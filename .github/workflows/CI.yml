# workflowВЮў ВЮ┤вдё
name: CI

# ьЋ┤вІ╣ workflowЖ░ђ ВќИВаю ВІцьќЅвља Ж▓ЃВЮИВДђВЌљ вїђьЋю ьіИвдгЖ▒░вЦ╝ ВДђВаЋ
on:
  push:
    branches:
      - dev
      - 'devops/**' #ьЁїВіцьіИвЦ╝ ВюёьЋ┤ ВъаВІю ВХћЖ░ђ

env:
  S3_BUCKET_NAME: kusuk
  PROJECT_NAME: KU-suk-Ku-suk

jobs:
  build:
    name: CI
    runs-on: ubuntu-latest

    steps:
      #workflow ВІцьќЅВаё checkout
      - uses: actions/checkout@v3
        with:
          fetch-depth: '0' #вфевЊа В╗цв░ІЖ│╝ вИївъюВ╣ўвЦ╝ Ж░ђВаИВў┤

      # jdk 21в▓ёВаё ВёцВ╣ў
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      #github secrets yml ьЎўЖ▓йв│ђВѕў ВБ╝ВъЁ.
      - name: Set Yaml
        uses: microsoft/variable-substitution@v1
        with:
          files: ./src/main/resources/application.yml
        env:
          spring.datasource.url: ${{ secrets.DB_URL }}
          spring.datasource.username: ${{ secrets.DB_USERNAME }}
          spring.datasource.password: ${{ secrets.DB_PASSWORD }}
          spring.datasource.driver-class-name: ${{ secrets.DB_DRIVER }}
          spring.jwt.secret: ${{ secrets.JWT_SECRET }}
          spring.data.redis.host: ${{secrets.REDIS_HOST}}
          spring.data.redis.port: ${{secrets.REDIS_PORT}}
          spring.data.redis.password: ${{secrets.REDIS_PASSWORD}}
          spring.mail.username: ${{secrets.MAIL_USERNAME}}
          spring.mail.password: ${{secrets.MAIL_PASSWORD}}
          cloud.aws.credentials.accessKey: ${{secrets.S3_ACCESSKEY}}
          cloud.aws.credentials.secretKey: ${{secrets.S3_SECRETKEY}}
          cloud.aws.s3.bucketName: ${{secrets.S3_BUCKETNAME}}
          #cloud.aws.cloudfront.domainName: ${{secrets.CLOUDFRONT_NAME}}

      #gradlew ВІцьќЅВЮё ВюёьЋю ЖХїьЋю ВХћЖ░ђ
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        shell: bash

      # build
      - name: Build with Gradle
        run: ./gradlew clean build -x test
        shell: bash

      - name: List contents of build/libs
        run: |
          ls -al build/libs/

      # git ВѓгВџЕВъљ ВаЋв│┤ ВёцВаЋ
      - name: set git user identity
        run: |
          git config user.name ${{secrets.USERNAME}}
          git config user.email ${{secrets.USEREMAIL}}

      # upload build artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/libs/

      - name: Copy deploy scripts and appspec
        run: |
          mkdir -p deploy
          cp ./scripts/*.sh ./deploy/
          cp appspec.yml ./deploy/
          cp build/libs/*.jar ./deploy/

      - name: Zip deploy folder
        run: |
          cd deploy
          zip -r ../$GITHUB_SHA.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Upload zip to S3
        run: |
          aws s3 cp $GITHUB_SHA.zip s3://$S3_BUCKET_NAME/$PROJECT_NAME/$GITHUB_SHA.zip --region ap-northeast-2

      - name: Cleanup old zip files in S3 (keep latest 2)
        run: |
          echo "­ЪЊѓ Listing all zip files in s3://$S3_BUCKET_NAME/$PROJECT_NAME/"

          # ВхюВІа 2Ж░ю ВаюВЎИьЋю вѓўвеИВДђ ВѓГВаю
          files_to_delete=$(aws s3 ls s3://$S3_BUCKET_NAME/$PROJECT_NAME/ --recursive --region ap-northeast-2 | \
            grep '\.zip$' | \
            grep -v "$GITHUB_SHA.zip" | \
            sort -k1,1r -k2,2r | \
            awk '{print $4}' | \
            tail -n +3)
          
          if [ -n "$files_to_delete" ]; then
            echo "­ЪЌЉ№ИЈ Deleting old files:"
            echo "$files_to_delete"
            echo "$files_to_delete" | while read -r file; do
            aws s3 rm s3://$S3_BUCKET_NAME/$PROJECT_NAME/"$file" --region ap-northeast-2
            done
          else
            echo "РюЁ No old files to delete."
          fi
          
      # origin devвАю веИВДђ
